version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: masjid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: masjid
      POSTGRES_USER: masjid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-masjid_secret_2024}
    volumes:
      - masjid-pgdata:/var/lib/postgresql/data
    networks:
      - masjid-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masjid"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: masjid-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-ganti_dengan_secret_yang_kuat_min32char}
      - DATABASE_URL=postgresql://masjid:${POSTGRES_PASSWORD:-masjid_secret_2024}@postgres:5432/masjid
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - masjid-net

  frontend:
    build: ./frontend
    container_name: masjid-frontend
    restart: unless-stopped
    networks:
      - masjid-net

  nginx:
    image: nginx:alpine
    container_name: masjid-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - masjid-net

volumes:
  masjid-pgdata:

networks:
  masjid-net:
    driver: bridge
